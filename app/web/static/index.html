<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoFilm 管理端</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d232b;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --danger: #b42318;
      --ok: #087443;
      --warn: #b54708;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      flex-shrink: 0;
    }
    h1 { margin: 0; font-size: 20px; font-weight: 700; }
    main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 20px 24px 16px;
    }
    button, select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }
    button { cursor: pointer; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-strong); }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-pause { color: #b45309; border-color: #b45309; }
    .btn-pause:hover { background: #fef3c7; }
    .btn-resume { color: #16a34a; border-color: #16a34a; }
    .btn-resume:hover { background: #dcfce7; }
    .btn-stop { color: #dc2626; border-color: #dc2626; }
    .btn-stop:hover { background: #fee2e2; }
    .btn-restart { color: #dc2626; border-color: #dc2626; }
    .btn-restart:hover { background: #fee2e2; }
    .job-paused { background: #fffbeb; }
    .job-paused td { color: #92400e; opacity: 0.75; }
    .job-paused td:nth-child(2) { text-decoration: line-through; }
    .paused-label { display: inline-block; padding: 1px 7px; border-radius: 10px; background: #fde68a; color: #92400e; font-size: 0.8em; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; font-weight: 600; white-space: nowrap; }
    .badge-running { background: #dcfce7; color: #15803d; }
    .badge-waiting { background: #dbeafe; color: #1d4ed8; }
    .badge-paused  { background: #fde68a; color: #92400e; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-shrink: 0; }
    .tab { min-width: 92px; }
    .tab.active { background: var(--text); color: #fff; border-color: var(--text); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; flex-shrink: 0; }
    .panel, .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric { padding: 14px; min-height: 86px; }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 8px; font-size: 22px; line-height: 1.1; }
    .panel { padding: 16px; }
    .panel h2 { margin: 0 0 12px; font-size: 16px; }
    .status-line { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 999px; background: var(--warn); }
    .dot.ok { background: var(--ok); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; }
    th { color: var(--muted); font-size: 12px; font-weight: 600; }
    textarea {
      flex: 1;
      min-height: 0;
      width: 100%;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--text);
      background: #fbfcfe;
    }
    pre {
      flex: 1;
      min-height: 0;
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #101828;
      color: #e6edf3;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .table-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .table-scroll table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    .table-scroll th, .table-scroll td { border-bottom: 1px solid var(--line); }
    .table-scroll td:last-child, .table-scroll th:last-child { width: 1%; white-space: nowrap; text-align: right; }
    .table-scroll td:last-child .toolbar { justify-content: flex-end; flex-wrap: nowrap; }
    .table-scroll thead th {
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }
    main > section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    main > section > .panel {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .hidden { display: none !important; }
    .message { min-height: 22px; color: var(--muted); }
    .message.error { color: var(--danger); }
    .message.ok { color: var(--ok); }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; padding: 14px 16px; }
      main { padding: 16px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { width: 100%; }
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .tabs { overflow-x: auto; }
      button, select { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>AutoFilm 管理端</h1>
      <div class="status-line"><span id="statusDot" class="dot"></span><span id="statusText">读取中</span></div>
    </div>
    <div class="toolbar">
      <button id="refreshBtn" class="primary">刷新</button>
    </div>
  </header>

  <main>
    <nav class="tabs" aria-label="视图">
      <button class="tab active" data-view="statusView">运行状态</button>
      <button class="tab" data-view="configView">配置</button>
      <button class="tab" data-view="globalLogView">总日志</button>
      <button class="tab" data-view="taskLogView">任务日志</button>
    </nav>

    <section id="statusView">
      <div class="grid">
        <div class="metric"><span>Alist2Strm</span><strong id="alistCount">0</strong></div>
        <div class="metric"><span>Ani2Alist</span><strong id="aniCount">0</strong></div>
        <div class="metric"><span>LibraryPoster</span><strong id="posterCount">0</strong></div>
        <div class="metric"><span>运行时间</span><strong id="uptime">0s</strong></div>
      </div>
      <div class="panel">
        <h2>调度任务</h2>
        <div class="table-scroll">
          <table>
            <colgroup>
              <col style="width:110px">
              <col>
              <col style="width:150px">
              <col style="width:130px">
              <col style="width:90px">
              <col style="width:210px">
            </colgroup>
            <thead><tr><th>分类</th><th>任务</th><th>触发规则</th><th>下次运行</th><th>状态</th><th></th></tr></thead>
            <tbody id="jobsBody"><tr><td colspan="6">暂无任务</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="configView" class="hidden">
      <div class="panel">
        <div class="toolbar" style="justify-content: space-between; margin-bottom: 10px;">
          <h2 style="margin:0;">配置文件</h2>
          <div class="toolbar">
            <button id="reloadConfigBtn">重新读取</button>
            <button id="saveConfigBtn" class="primary">保存</button>
            <button id="restartBtn" class="btn-restart">重启</button>
          </div>
        </div>
        <textarea id="configEditor" spellcheck="false"></textarea>
        <div id="configMessage" class="message"></div>
      </div>
    </section>

    <section id="globalLogView" class="hidden">
      <div class="panel">
        <div class="toolbar" style="justify-content: space-between; margin-bottom: 12px;">
          <h2 style="margin: 0; font-size: 16px;">总日志</h2>
          <div class="toolbar">
            <select id="globalLogDate"><option value="">加载中…</option></select>
            <select id="globalLogLines">
              <option value="100">100 行</option>
              <option value="200" selected>200 行</option>
              <option value="500">500 行</option>
            </select>
          </div>
        </div>
        <pre id="globalLogOutput">暂无日志记录</pre>
      </div>
    </section>

    <section id="taskLogView" class="hidden">
      <div class="panel">
        <div class="toolbar" style="justify-content: space-between; margin-bottom: 12px;">
          <div class="toolbar">
            <span style="color: var(--muted); font-size: 13px; white-space: nowrap;">选择任务：</span>
            <select id="taskJobSelect" style="min-width: 200px;"><option value="">-- 请先选择任务 --</option></select>
          </div>
          <div class="toolbar">
            <select id="taskLogDate"><option value="">选择日期</option></select>
            <select id="taskLogLines">
              <option value="100">100 行</option>
              <option value="200" selected>200 行</option>
              <option value="500">500 行</option>
            </select>
          </div>
        </div>
        <pre id="taskLogOutput">请选择任务查看日志</pre>
      </div>
    </section>
  </main>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const tabs = document.querySelectorAll('.tab');
    const views = ['statusView', 'configView', 'globalLogView', 'taskLogView'];
    let currentStatus = null;
    let currentLogJobId = '';
    let currentLogName = '';

    function populateTaskSelector(jobs) {
      const sel = $('#taskJobSelect');
      const prev = sel.value;
      sel.innerHTML = '<option value="">-- 请先选择任务 --</option>' +
        (jobs || []).map((j) => {
          const label = (j.category ? j.category + ' · ' : '') + (j.name || j.id);
          return `<option value="${escapeHtml(j.id)}" data-name="${escapeHtml(j.name || j.id)}">${escapeHtml(label)}</option>`;
        }).join('');
      if (prev) sel.value = prev;
    }

    function formatNextRunTime(isoStr) {
      if (!isoStr) return '-';
      const dt = new Date(isoStr);
      const now = new Date();
      const diffMs = dt - now;
      if (diffMs < 0) return '即将运行';
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffMs / 60000);
      const diffHrs = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      if (diffSec < 60) return `${diffSec} 秒后`;
      if (diffMin < 60) return `${diffMin} 分钟后`;
      if (diffHrs < 24) return `${diffHrs} 小时后`;
      if (diffDays === 1) {
        const t = dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        return `明天 ${t}`;
      }
      if (diffDays < 7) {
        const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const t = dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        return `${days[dt.getDay()]} ${t}`;
      }
      return dt.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatSeconds(seconds) {
      const value = Number(seconds || 0);
      const h = Math.floor(value / 3600);
      const m = Math.floor((value % 3600) / 60);
      const s = value % 60;
      if (h) return `${h}h ${m}m`;
      if (m) return `${m}m ${s}s`;
      return `${s}s`;
    }

    const _BASE = (() => { const p = location.pathname; return p.endsWith('/') ? p : p.slice(0, p.lastIndexOf('/') + 1); })();
    async function api(path, options = {}) {
      const url = path.startsWith('/') ? _BASE + path.slice(1) : path;
      const response = await fetch(url, options);
      let payload;
      try { payload = await response.json(); }
      catch { throw new Error(`请求失败 ${response.status}（响应内容非 JSON）`); }
      if (!response.ok || !payload.ok) throw new Error(payload.error || `请求失败 ${response.status}`);
      return payload.data;
    }

    function setMessage(element, text, type = '') {
      element.textContent = text;
      element.className = `message ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      })[char]);
    }

    function renderStatus(data) {
      currentStatus = data;
      $('#alistCount').textContent = data.tasks.alist2strm;
      $('#aniCount').textContent = data.tasks.ani2alist;
      $('#posterCount').textContent = data.tasks.libraryPoster;
      $('#uptime').textContent = formatSeconds(data.uptimeSeconds);
      $('#statusDot').classList.toggle('ok', data.schedulerRunning);
      $('#statusText').textContent = data.schedulerRunning ? '调度器运行中' : '调度器未绑定或未运行';
      const jobs = data.jobs || [];
      $('#jobsBody').innerHTML = jobs.length ? jobs.map((job) => {
        const rowClass = job.paused ? 'job-paused' : '';
        const badge = job.running
          ? '<span class="badge badge-running">正在运行</span>'
          : job.paused
            ? '<span class="badge badge-paused">已暂停</span>'
            : '<span class="badge badge-waiting">等待运行</span>';
        const nextRun = job.paused
          ? ''
          : escapeHtml(formatNextRunTime(job.nextRunTime));
        const actionBtns = [
          `<button data-run-job="${escapeHtml(job.id)}">立即运行</button>`,
          job.running
            ? `<button class="btn-stop" data-stop-job="${escapeHtml(job.id)}">停止</button>`
            : job.paused
              ? `<button class="btn-resume" data-resume-job="${escapeHtml(job.id)}">启动</button>`
              : `<button class="btn-pause" data-pause-job="${escapeHtml(job.id)}">暂停</button>`,
          `<button data-view-log="${escapeHtml(job.id)}" data-log-name="${escapeHtml(job.name || job.id)}">日志</button>`,
        ].join('');
        return `
        <tr class="${rowClass}">
          <td>${escapeHtml(job.category || '')}</td>
          <td>${escapeHtml(job.name || job.id)}</td>
          <td>${escapeHtml(job.trigger)}</td>
          <td>${nextRun}</td>
          <td>${badge}</td>
          <td><div class="toolbar">${actionBtns}</div></td>
        </tr>`;
      }).join('') : '<tr><td colspan="6">暂无任务</td></tr>';
      populateTaskSelector(data.jobs);
    }

    async function loadStatus() {
      const data = await api('/api/status');
      renderStatus(data);
    }

    async function loadConfig() {
      const data = await api('/api/config');
      $('#configEditor').value = data.content || '';
      setMessage($('#configMessage'), `当前文件：${data.path}`);
    }

    async function saveConfig() {
      const button = $('#saveConfigBtn');
      button.disabled = true;
      try {
        const data = await api('/api/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: $('#configEditor').value })
        });
        setMessage($('#configMessage'), data.message, 'ok');
        await loadStatus();
      } catch (error) {
        setMessage($('#configMessage'), error.message, 'error');
      } finally {
        button.disabled = false;
      }
    }

    async function loadGlobalLogDates() {
      try {
        const data = await api('/api/logs/dates');
        const sel = $('#globalLogDate');
        const dates = data.dates || [];
        sel.innerHTML = dates.length
          ? dates.map(d => `<option value="${d}">${d}</option>`).join('')
          : '<option value="">无日志文件</option>';
        if (dates.length) sel.value = dates[0];
      } catch (e) { /* ignore */ }
    }

    async function loadTaskLogDates(jobId) {
      try {
        const data = await api(`/api/jobs/logs/dates?jobId=${encodeURIComponent(jobId)}`);
        const sel = $('#taskLogDate');
        const dates = data.dates || [];
        sel.innerHTML = dates.length
          ? dates.map(d => `<option value="${d}">${d}</option>`).join('')
          : '<option value="">无日志文件</option>';
        if (dates.length) sel.value = dates[0];
      } catch (e) { /* ignore */ }
    }

    async function loadGlobalLog() {
      const date = $('#globalLogDate').value;
      try {
        if (!date) return;
        const data = await api(`/api/logs?date=${date}&lines=${$('#globalLogLines').value}`);
        $('#globalLogOutput').textContent = data.content || '暂无日志记录';
      } catch (e) {
        $('#globalLogOutput').textContent = `加载失败：${e.message}`;
      }
    }

    async function loadTaskLog() {
      try {
        if (!currentLogJobId) {
          $('#taskLogOutput').textContent = '请从上方选择一个任务查看日志';
          return;
        }
        const date = $('#taskLogDate').value;
        if (!date) return;
        const data = await api(`/api/jobs/logs?jobId=${encodeURIComponent(currentLogJobId)}&date=${date}&lines=${$('#taskLogLines').value}`);
        $('#taskLogOutput').textContent = data.content || '任务尚未运行，暂无日志记录';
      } catch (e) {
        $('#taskLogOutput').textContent = `加载失败：${e.message}`;
      }
    }

    async function runJob(jobId) {
      $('#statusText').textContent = `正在触发 ${jobId}`;
      await api('/api/jobs/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId })
      });
      $('#statusText').textContent = `${jobId} 已触发`;
      await loadStatus();
    }

    async function pauseJob(jobId) {
      await api('/api/jobs/pause', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId })
      });
      await loadStatus();
    }

    async function resumeJob(jobId) {
      await api('/api/jobs/resume', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId })
      });
      await loadStatus();
    }

    async function viewTaskLog(jobId, taskName) {
      currentLogJobId = jobId;
      currentLogName = taskName || jobId;
      const sel = $('#taskJobSelect');
      if (sel) sel.value = jobId;
      tabs.forEach((item) => item.classList.toggle('active', item.dataset.view === 'taskLogView'));
      views.forEach((view) => $(`#${view}`).classList.toggle('hidden', view !== 'taskLogView'));
      await loadTaskLogDates(jobId);
      startPoll(loadTaskLog);
    }

    async function stopJob(jobId) {
      await api('/api/jobs/stop', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId })
      });
      await loadStatus();
    }

    let pollTimer = null;
    function startPoll(fn) {
      stopPoll();
      fn();
      pollTimer = setInterval(fn, 3000);
    }
    function stopPoll() {
      if (pollTimer !== null) { clearInterval(pollTimer); pollTimer = null; }
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((item) => item.classList.remove('active'));
        tab.classList.add('active');
        views.forEach((view) => $(`#${view}`).classList.toggle('hidden', view !== tab.dataset.view));
        if (tab.dataset.view === 'statusView') startPoll(loadStatus);
        else if (tab.dataset.view === 'globalLogView') {
          loadGlobalLogDates().then(() => startPoll(loadGlobalLog));
        } else if (tab.dataset.view === 'taskLogView') startPoll(loadTaskLog);
        else stopPoll();
      });
    });

    $('#refreshBtn').addEventListener('click', async () => { await loadStatus(); });
    $('#reloadConfigBtn').addEventListener('click', loadConfig);
    $('#saveConfigBtn').addEventListener('click', saveConfig);
    $('#restartBtn').addEventListener('click', async () => {
      const btn = $('#restartBtn');
      btn.disabled = true;
      try {
        await api('/api/restart', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        setMessage($('#configMessage'), '应用重启中，请稍候刷新页面…', 'ok');
        setTimeout(() => location.reload(), 3000);
      } catch (e) {
        setMessage($('#configMessage'), e.message, 'error');
        btn.disabled = false;
      }
    });
    $('#globalLogLines').addEventListener('change', loadGlobalLog);
    $('#globalLogDate').addEventListener('change', loadGlobalLog);
    $('#taskLogLines').addEventListener('change', loadTaskLog);
    $('#taskLogDate').addEventListener('change', loadTaskLog);
    $('#taskJobSelect').addEventListener('change', async () => {
      const sel = $('#taskJobSelect');
      const opt = sel.options[sel.selectedIndex];
      currentLogJobId = sel.value;
      currentLogName = opt ? (opt.dataset.name || opt.text) : sel.value;
      if (currentLogJobId) await loadTaskLogDates(currentLogJobId);
      await loadTaskLog();
    });
    $('#jobsBody').addEventListener('click', async (event) => {
      const button = event.target.closest('[data-run-job]');
      const pauseBtn = event.target.closest('[data-pause-job]');
      const resumeBtn = event.target.closest('[data-resume-job]');
      const stopBtn = event.target.closest('[data-stop-job]');
      const logButton = event.target.closest('[data-view-log]');
      if (button) await runJob(button.dataset.runJob);
      if (pauseBtn) await pauseJob(pauseBtn.dataset.pauseJob);
      if (resumeBtn) await resumeJob(resumeBtn.dataset.resumeJob);
      if (stopBtn) await stopJob(stopBtn.dataset.stopJob);
      if (logButton) await viewTaskLog(logButton.dataset.viewLog, logButton.dataset.logName);
    });

    (async function init() {
      try {
        await loadStatus();
        await loadConfig();
        await loadGlobalLogDates();
        await loadGlobalLog();
        startPoll(loadStatus);
      } catch (error) {
        $('#statusText').textContent = error.message;
      }
    })();
  </script>
</body>
</html>
